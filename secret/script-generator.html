  <style>
    /* ============================================================
       Generator固有スタイル（style.cssを補完）
    ============================================================ */
    :root {
      --mono: 'JetBrains Mono', monospace;
      --input-bg:     rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
    }
    [data-theme="light"] {
      --input-bg:     rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --input-bg:     rgba(255,255,255,0.04);
      --input-border: rgba(255,255,255,0.08);
    }

    /* ページタイトル */
    .page-heading { margin-bottom: 28px; }
    .page-heading h2 { font-size: 18px; font-weight: 700; }
    .page-heading p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* カードheader行 */
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .card-header h3 { font-size: 16px; font-weight: 700; margin: 0; }
    .tag.green { background: rgba(34,197,94,0.2); color: #4ade80; }

    /* フォームフィールド */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field > label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 6px; font-weight: 700;
    }
    .field input[type=text],
    .field input[type=number] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--input-color);
      padding: 10px 13px; border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .field input.err { border-color: #f87171; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 5px; opacity: 0.7; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

    /* 検索範囲チップ */
    .range-row { display: flex; gap: 10px; }
    .range-chip {
      flex: 1; padding: 10px; background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 8px; cursor: pointer; text-align: center;
      font-size: 13px; font-weight: 700; color: var(--muted);
      transition: all 0.18s; user-select: none;
    }
    .range-chip input { display: none; }
    .range-chip.on {
      border-color: var(--accent);
      background: rgba(59,130,246,0.12);
      color: var(--accent);
    }

    /* ステータスグリッド */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap > input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
      color: var(--input-color); border-radius: 8px;
      padding: 9px 13px 9px 34px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap > input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }

    .preset-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .preset-count { font-size: 12px; color: var(--muted); }
    .preset-count span { color: var(--accent); font-weight: 700; }

    .status-grid {
      display: grid; gap: 5px;
      max-height: 340px; overflow-y: auto; padding-right: 4px;
    }
    .status-grid::-webkit-scrollbar { width: 4px; }
    .status-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .status-row {
      display: grid; grid-template-columns: 1fr 120px;
      align-items: center; gap: 8px;
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 8px; padding: 7px 10px;
      transition: border-color 0.15s;
    }
    .status-row.has-val { border-color: rgba(59,130,246,0.45); }
    .status-name { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .status-input {
      background: var(--input-bg); border: 1px solid var(--input-border);
      color: var(--input-color); border-radius: 6px; padding: 5px 8px;
      font-family: var(--mono); font-size: 13px; text-align: right;
      outline: none; width: 100%; transition: border-color 0.15s;
    }
    .status-input:focus { border-color: var(--accent); }
    .status-input.filled { border-color: var(--accent); color: var(--accent); }

    /* 生成ボタン */
    .btn-generate {
      width: 100%; padding: 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-bottom: 20px; transition: all 0.2s;
    }
    .btn-generate:hover {
      opacity: 0.88; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }
    .btn-generate:active { transform: none; }

    /* 小ボタン */
    .btn-sm {
      padding: 5px 14px; border-radius: 6px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--input-bg); color: var(--muted);
      transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-sm.primary:hover { opacity: 0.85; }

    /* 結果コードボックス */
    .result-wrap { display: none; }
    .code-box {
      background: rgba(0,0,0,0.25); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    [data-theme="light"] .code-box { background: rgba(0,0,0,0.04); }

    .code-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .code-toolbar-left { display: flex; align-items: center; gap: 8px; }
    .code-toolbar-left span { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .badge {
      display: none; font-size: 10px; padding: 2px 8px; border-radius: 20px;
      font-weight: 700; background: rgba(34,197,94,0.15); color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .badge.visible { display: inline-block; }
    .code-actions { display: flex; gap: 8px; }

    pre code {
      display: block; padding: 16px; font-family: var(--mono);
      font-size: 11.5px; color: var(--muted); white-space: pre-wrap;
      word-break: break-all; max-height: 480px; overflow-y: auto; line-height: 1.7;
    }
    pre code::-webkit-scrollbar { width: 4px; }
    pre code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

const themeBtns = document.querySelectorAll('.theme-btn');
function applyTheme(theme) {
  if (theme === 'original') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('kbc-theme', theme);
  themeBtns.forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
}
themeBtns.forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));
applyTheme(localStorage.getItem('kbc-theme') || 'original');

// ============================================================
// ステータスグリッド構築
// ============================================================
const grid = document.getElementById('status-grid');
const presetValues = {}; // offset -> value

function buildGrid(filter = '') {
  grid.innerHTML = '';
  const q = filter.toLowerCase();
  STATUS.forEach(s => {
    if (q && !s.name.toLowerCase().includes(q)) return;
    const row = document.createElement('div');
    row.className = 'status-row' + (presetValues[s.offset] !== undefined ? ' has-val' : '');
    row.innerHTML = `
      <span class="status-name">${s.name} <span style="color:var(--text3);font-size:10px;">(${s.offset})</span></span>
      <input class="status-input${presetValues[s.offset] !== undefined ? ' filled' : ''}"
        type="number" placeholder="空欄=変更なし"
        data-offset="${s.offset}"
        value="${presetValues[s.offset] !== undefined ? presetValues[s.offset] : ''}">
    `;
    grid.appendChild(row);
  });
  updateCount();
}

function updateCount() {
  document.getElementById('preset-count').textContent = Object.keys(presetValues).length;
}

// イベント委任でinput変化を捕捉
grid.addEventListener('input', e => {
  if (!e.target.classList.contains('status-input')) return;
  const offset = parseInt(e.target.dataset.offset);
  const val = e.target.value.trim();
  if (val === '' || val === null) {
    delete presetValues[offset];
    e.target.classList.remove('filled');
    e.target.closest('.status-row').classList.remove('has-val');
  } else {
    presetValues[offset] = parseInt(val);
    e.target.classList.add('filled');
    e.target.closest('.status-row').classList.add('has-val');
  }
  updateCount();
});

document.getElementById('status-search').addEventListener('input', e => {
  buildGrid(e.target.value);
});

document.getElementById('clear-preset').addEventListener('click', () => {
  Object.keys(presetValues).forEach(k => delete presetValues[k]);
  buildGrid(document.getElementById('status-search').value);
});

// Range chips
document.querySelectorAll('.range-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
  });
});

buildGrid();

// ============================================================
// Lua生成
// ============================================================
document.getElementById('gen-btn').addEventListener('click', () => {
  const pattern = document.getElementById('pattern').value.trim();
  const refine  = parseInt(document.getElementById('refine').value);
  const range   = document.querySelector('input[name=range]:checked').value === 'cb'
    ? 'gg.REGION_C_BSS' : 'gg.REGION_OTHER';

  document.getElementById('pattern').classList.remove('err');
  document.getElementById('refine').classList.remove('err');

  if (!pattern) { document.getElementById('pattern').classList.add('err'); return; }
  if (isNaN(refine)) { document.getElementById('refine').classList.add('err'); return; }

  // プリセット行を生成
  const presetEntries = Object.entries(presetValues);
  let autoApplyBlock = '';
  if (presetEntries.length > 0) {
    const lines = presetEntries.map(([offset, val]) => {
      const s = STATUS.find(x => x.offset === parseInt(offset));
      const name = s ? s.name : 'offset' + offset;
      return `  applyEdit(${offset}, ${val})  -- ${name}`;
    }).join('\n');
    autoApplyBlock = `
-- ============================================================
-- 起動時プリセット自動適用 (${presetEntries.length}件)
-- ============================================================
${lines}
gg.toast("プリセット適用完了 (${presetEntries.length}件)")
`;
  }

  const lua = buildLua(pattern, refine, range, autoApplyBlock);

  document.getElementById('result-code').textContent = lua;
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('applied-count').textContent =
    presetEntries.length > 0 ? `プリセット ${presetEntries.length}件` : '';
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth', block:'start'});
});

// ============================================================
// Copy / Download
// ============================================================
document.getElementById('copy-btn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(document.getElementById('result-code').textContent);
    document.getElementById('copy-btn').textContent = '✅ コピー完了';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 コピー', 2000);
  } catch { alert('コピーに失敗しました'); }
});

document.getElementById('dl-btn').addEventListener('click', () => {
  const code = document.getElementById('result-code').textContent;
  if (!code) return;
  const charaName = document.getElementById('chara-name').value.trim();
  let filename;
  if (charaName) {
    filename = `[${charaName}]ステータス変更スクリプト.lua`;
  } else {
    const now = new Date();
    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    filename = `nyanko_${ts}.lua`;
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([code], {type:'text/plain;charset=utf-8'}));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
});

// ============================================================
// Luaテンプレート
// ============================================================
function buildLua(pattern, refine, range, autoApplyBlock) {
  const statusLines = STATUS.map(s =>
    `  {offset=${String(s.offset).padStart(5)}, name="${s.name}"}`
  ).join(',\n');

  return `-- ============================================================
-- nyanko status editor
-- 製作者:健康おじと愉快なAI達
-- ============================================================

local SEARCH_PATTERN = "${pattern}"
local REFINE_VALUE   = ${refine}
local SEARCH_RANGE   = ${range}

-- ============================================================
-- STATUS
-- ============================================================
local STATUS = {
${statusLines}
}

-- ============================================================
-- 検索・リファイン
-- ============================================================
gg.clearResults()
gg.setRanges(SEARCH_RANGE)
gg.searchNumber(SEARCH_PATTERN, gg.TYPE_DWORD)

local results = gg.getResults(99999)
gg.clearResults()

if not results or #results == 0 then
  gg.alert("自動検索で見つかりませんでした\\n手動で入力してください")
  local inp = gg.prompt(
    {"検索パターン", "リファイン値（コスト値）"},
    {SEARCH_PATTERN, tostring(REFINE_VALUE)},
    {"text", "number"}
  )
  if not inp then
    gg.toast("キャンセルされました")
    return
  end
  SEARCH_PATTERN = inp[1]
  REFINE_VALUE   = math.floor(tonumber(inp[2]) or 0)

  gg.clearResults()
  gg.setRanges(SEARCH_RANGE)
  gg.searchNumber(SEARCH_PATTERN, gg.TYPE_DWORD)
  results = gg.getResults(99999)
  gg.clearResults()

  if not results or #results == 0 then
    gg.alert("見つかりませんでした\\nスクリプトを終了します")
    return
  end
end

gg.toast("検索: " .. #results .. "件ヒット", true)

local refined = {}
for _, r in ipairs(results) do
  if r.value == REFINE_VALUE then
    table.insert(refined, {address = r.address})
  end
end

if #refined == 0 then
  gg.alert("リファイン失敗\\nコスト値 [" .. REFINE_VALUE .. "] に一致するものがありませんでした\\n(検索結果: " .. #results .. "件)")
  return
end

gg.toast("対象: " .. #refined .. "件", true)

local baseAddr    = refined[1].address
local baseAddrHex = string.format("0x%X", baseAddr)

-- ============================================================
-- バックアップ
-- ============================================================
local backup = {}
for _, ref in ipairs(refined) do
  local readList = {}
  for _, s in ipairs(STATUS) do
    table.insert(readList, {address = ref.address + s.offset, flags = gg.TYPE_DWORD})
  end
  table.insert(backup, {baseAddr = ref.address, vals = gg.getValues(readList)})
end

-- ============================================================
-- 書き換え
-- ============================================================
local function applyEdit(offset, val)
  local editList = {}
  for _, ref in ipairs(refined) do
    table.insert(editList, {
      address = ref.address + offset,
      flags   = gg.TYPE_DWORD,
      value   = math.floor(tonumber(val) or 0)
    })
  end
  gg.setValues(editList)
end

-- ============================================================
-- リストに保存
-- ============================================================
local function saveToList()
  local readList = {}
  for _, s in ipairs(STATUS) do
    table.insert(readList, {address = baseAddr + s.offset, flags = gg.TYPE_DWORD})
  end
  local cur = gg.getValues(readList)
  local listItems = {}
  for i, s in ipairs(STATUS) do
    table.insert(listItems, {
      address = baseAddr + s.offset,
      flags   = gg.TYPE_DWORD,
      value   = cur[i] and cur[i].value or 0,
      name    = s.name
    })
  end
  gg.addListItems(listItems)
  gg.toast("リストに追加しました (" .. #listItems .. "件)")
end
${autoApplyBlock}
-- ============================================================
-- メニュー定義
-- ============================================================
local MAIN_MENU = {
  "ステータスを変更する",
  "元の値に戻す",
  "リストに保存",
  "スクリプトを終了"
}
local CONFIRM_MENU = {"はい", "いいえ"}

local lastMainPos   = nil
local lastStatusPos = nil
local currentScreen = "main"

-- ============================================================
-- メインループ
-- ============================================================
while true do

  if currentScreen == "status" then

    local readList = {}
    for _, s in ipairs(STATUS) do
      table.insert(readList, {address = refined[1].address + s.offset, flags = gg.TYPE_DWORD})
    end
    local cur = gg.getValues(readList)

    local items = {"<< メニューに戻る"}
    for i, s in ipairs(STATUS) do
      local v = cur[i] and tostring(cur[i].value) or "?"
      table.insert(items, s.name .. "  [" .. v .. "]")
    end

    local sc = gg.choice(items, lastStatusPos, "ステータス一覧  対象: " .. #refined .. "件")

    if sc == nil then
      gg.setVisible(false)
    elseif sc == 1 then
      lastStatusPos = nil
      currentScreen = "main"
    else
      lastStatusPos = sc
      local i  = sc - 1
      local s  = STATUS[i]
      local cv = cur[i] and tostring(cur[i].value) or "0"
      local inp = gg.prompt({s.name .. " (offset " .. s.offset .. ")"}, {cv}, {"number"})
      if inp and inp[1] ~= nil then
        applyEdit(s.offset, inp[1])
        gg.toast("書き換えました")
      end
    end

  else

    local mc = gg.choice(
      MAIN_MENU,
      lastMainPos,
      "コストアドレス: " .. baseAddrHex .. "\\n対象: " .. #refined .. "件"
    )

    if mc == nil then
      gg.setVisible(false)
    elseif mc == 1 then
      lastMainPos   = mc
      currentScreen = "status"
    elseif mc == 2 then
      lastMainPos = mc
      for _, bk in ipairs(backup) do
        gg.setValues(bk.vals)
      end
      gg.toast("元の値に戻しました")
    elseif mc == 3 then
      lastMainPos = mc
      saveToList()
    elseif mc == 4 then
      local cf = gg.choice(CONFIRM_MENU, nil, "本当に終了しますか？")
      if cf == 1 then
        saveToList()
        gg.clearResults()
        os.exit()
      end
    end

  end

  while not gg.isVisible() do
    gg.sleep(500)
  end

end`;
}

</script>
</body>
</html>

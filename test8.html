<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にゃんこ大戦争 引き継ぎコード発行</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.75rem;
    }

    .drop-zone {
      border: 2px dashed #0f3460;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #0d1b2a;
      margin-bottom: 1.25rem;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #e94560;
      background: #1a1035;
    }

    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .drop-zone .label { font-size: 0.9rem; color: #aaa; }
    .drop-zone .filename {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #e94560;
      font-weight: 600;
    }

    input[type="file"] { display: none; }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: #e94560;
      color: #fff;
    }
    .btn:hover:not(:disabled) { background: #c73652; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }
    .status.loading { display: block; background: #0f3460; color: #7ec8e3; }
    .status.error   { display: block; background: #3d0a14; color: #ff6b6b; }
    .status.success { display: block; background: #0a3d1e; color: #6bffb8; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-box {
      margin-top: 1.25rem;
      display: none;
      background: #0a1628;
      border: 1px solid #0f3460;
      border-radius: 12px;
      overflow: hidden;
    }
    .result-box.show { display: block; }

    .result-row {
      padding: 0.9rem 1.1rem;
      border-bottom: 1px solid #0f3460;
    }
    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .result-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: #e94560;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
    }

    .copy-btn {
      float: right;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      background: #0f3460;
      color: #aaa;
      border: 1px solid #1a4080;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
    }
    .copy-btn:hover { background: #1a4080; color: #fff; }
    .copy-btn.copied { color: #6bffb8; border-color: #6bffb8; }

    .steps {
      font-size: 0.78rem;
      color: #888;
      margin-top: 1rem;
      padding: 0.9rem;
      background: #0d1b2a;
      border-radius: 8px;
      line-height: 1.6;
    }
    .steps strong { color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐱 引き継ぎコード発行</h1>
    <p class="subtitle">セーブファイルをアップロードして引き継ぎコードを取得</p>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <div class="label">クリックまたはドラッグ&ドロップ</div>
      <div class="label">SAVE_DATA ファイルを選択</div>
      <div class="filename" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept="*/*" />

    <button class="btn" id="uploadBtn" disabled>
      引き継ぎコードを発行
    </button>

    <div class="status" id="status"></div>

    <div class="result-box" id="resultBox">
      <div class="result-row">
        <div class="result-label">
          引き継ぎID
          <button class="copy-btn" onclick="copyText('transferCode')">コピー</button>
        </div>
        <div class="result-value" id="transferCode">—</div>
      </div>
      <div class="result-row">
        <div class="result-label">
          確認コード
          <button class="copy-btn" onclick="copyText('confirmationCode')">コピー</button>
        </div>
        <div class="result-value" id="confirmationCode">—</div>
      </div>
    </div>

    <div class="steps">
      <strong>使い方:</strong><br>
      1. SAVE_DATA ファイルをここにドロップ<br>
      2. 「引き継ぎコードを発行」をタップ<br>
      3. 発行されたコードをゲームで入力
    </div>
  </div>

  <script>
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileName  = document.getElementById('fileName');
    const status    = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');

    let selectedFile = null;

    // ─── ファイル選択 ─────────────────────────────────────────
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      uploadBtn.disabled = false;
      hideStatus();
      resultBox.classList.remove('show');
    }

    // ─── アップロード ─────────────────────────────────────────
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      showStatus('loading', '<span class="spinner"></span>認証・アップロード処理中...');
      resultBox.classList.remove('show');

      try {
        const arrayBuffer = await selectedFile.arrayBuffer();

        const response = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: arrayBuffer,
        });

        const data = await response.json();

        if (!data.success) {
          throw new Error(data.error || '不明なエラー');
        }

        showStatus('success', '✅ 引き継ぎコードの取得に成功しました！');

        document.getElementById('transferCode').textContent    = data.transferCode;
        document.getElementById('confirmationCode').textContent = data.confirmationCode;
        resultBox.classList.add('show');

      } catch (e) {
        showStatus('error', `❌ エラー: ${e.message}`);
      } finally {
        uploadBtn.disabled = false;
      }
    });

    // ─── UI ──────────────────────────────────────────────────
    function showStatus(type, html) {
      status.className = `status ${type}`;
      status.innerHTML = html;
    }
    function hideStatus() {
      status.className = 'status';
    }

    function copyText(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
      });
    }
  </script>
</body>
</html>

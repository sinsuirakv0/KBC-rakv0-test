<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>にゃんこ大戦争スケジュール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* ===== リセット & 基本 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff8c00;
      --orange-light: #ffa733;
      --orange-dark: #cc6f00;
      --bg: #f7f3ee;
      --card-bg: #ffffff;
      --text: #2a2a2a;
      --text-muted: #888;
      --border: #e5ddd5;
      --green: #4caf50;
      --blue: #2196f3;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--orange);
      color: white;
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .cat-icon { font-size: 1.4rem; }

    /* ===== タブ ===== */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 3px solid var(--orange);
      overflow-x: auto;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      white-space: nowrap;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover { color: var(--orange); }
    .tab.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }

    /* ===== コントロール ===== */
    .controls {
      background: #fff;
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      color: var(--text);
    }
    .controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--orange);
      cursor: pointer;
    }
    #now-display {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== メインコンテンツ ===== */
    main { max-width: 800px; margin: 0 auto; padding: 12px 12px 40px; }

    .content { display: none; }
    .content.active { display: block; }

    /* ===== ローディング ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .loading::before { content: '🐱 '; }

    /* ===== イベントカード ===== */
    .event-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--orange-light);
      transition: box-shadow 0.2s;
    }
    .event-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
    .event-card.is-current { border-left-color: var(--green); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }

    .event-name {
      font-weight: bold;
      font-size: 0.93rem;
      line-height: 1.5;
      flex: 1;
      min-width: 0;
    }

    .event-message {
      color: #555;
      font-size: 0.82rem;
      margin-top: 5px;
      line-height: 1.5;
    }

    .event-dates {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ===== タグ ===== */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .tag-current { background: var(--green); color: white; }
    .tag-future  { background: var(--blue); color: white; }

    /* ===== カウント表示 ===== */
    .count-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    /* ===== 空状態 ===== */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ===== カード: 新レイアウト ===== */
    .event-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 7px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--orange-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: box-shadow 0.2s, background 0.15s;
      user-select: none;
    }
    .event-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.13); background: #fdf8f2; }
    .event-card.is-current { border-left-color: var(--green); }

    .card-tag {
      flex-shrink: 0;
      display: inline-block;
      padding: 2px 7px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .tag-current { background: var(--green); color: white; }
    .tag-future  { background: var(--blue);  color: white; }
    .tag-past    { background: #aaa;          color: white; }

    .card-body { flex: 1; min-width: 0; }
    .card-period {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .card-name {
      font-weight: bold;
      font-size: 0.9rem;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-arrow { flex-shrink: 0; color: #ccc; font-size: 0.8rem; }

    /* ===== オーバーレイ ===== */
    .overlay-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
    }
    .overlay-backdrop.show { display: flex; }
    .overlay-panel {
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .overlay-close {
      float: right; font-size: 1.4rem; cursor: pointer;
      color: #aaa; line-height: 1; padding: 0 4px;
    }
    .overlay-close:hover { color: #444; }
    .overlay-title {
      font-size: 1rem; font-weight: bold;
      margin-bottom: 14px; line-height: 1.5; padding-right: 24px;
    }
    .overlay-section { margin-bottom: 12px; }
    .overlay-label {
      font-size: 0.75rem; font-weight: bold;
      color: var(--orange-dark); margin-bottom: 3px;
    }
    .overlay-value {
      font-size: 0.88rem; color: var(--text);
      line-height: 1.7; white-space: pre-wrap;
    }


    /* ===== 仮プレースホルダー ===== */
    .placeholder-notice {
      background: #fff8f0;
      border: 2px dashed var(--orange-light);
      border-radius: 10px;
      padding: 24px 20px;
      margin-top: 8px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 2;
    }
    .placeholder-label {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 2px 10px;
      border-radius: 99px;
      margin-bottom: 10px;
    }
    .placeholder-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 20px;
      background: var(--orange);
      color: #fff;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.88rem;
      text-decoration: none;
      transition: background 0.15s;
    }
    .placeholder-link:hover { background: var(--orange-dark); }
    /* ===== ガチャ セクション ===== */
    .gatya-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 8px;
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--orange-dark);
    }
    .gatya-section-header::before,
    .gatya-section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--orange-light);
    }
    .gatya-section:first-child .gatya-section-header {
      margin-top: 0;
    }
    .overlay-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .count-label {
      font-size: 0.8rem; color: var(--text-muted);
      margin-bottom: 8px; padding-left: 2px;
    }
    .empty {
      text-align: center; padding: 40px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .loading {
      text-align: center; padding: 40px;
      color: var(--text-muted); font-size: 0.95rem;
    }
    .loading::before { content: '🐱 '; }
  </style>
</head>
<body>

<header>
  <span class="cat-icon">🐱</span>
  にゃんこ大戦争スケジュール
</header>

<div class="tabs">
  <div class="tab active" data-tab="gatya">ガチャ</div>
  <div class="tab" data-tab="sale">イベント</div>
  <div class="tab" data-tab="item">アイテム</div>
  <div class="tab" data-tab="mission">ミッション</div>
</div>

<div class="controls">
  <label>
    <input type="checkbox" id="showCurrent">
    開催中も表示
  </label>
  <label>
    <input type="checkbox" id="showPast">
    過去も表示
  </label>
  <label>
    <input type="checkbox" id="sortByDate">
    日付順に並べる
  </label>
  <label id="label-showAllSale">
    <input type="checkbox" id="showAllSale">
    常設を含む全イベントを表示
  </label>
  <span id="now-display"></span>
</div>

<main>
  <div id="gatya" class="content active"><div class="loading">読み込み中...</div></div>
  <div id="sale"    class="content"><div class="loading">読み込み中...</div></div>
  <div id="item"    class="content"><div class="loading">読み込み中...</div></div>
  <div id="mission" class="content"><div class="loading">読み込み中...</div></div>
</main>

<!-- オーバーレイ -->
<div id="overlay" class="overlay-backdrop">
  <div class="overlay-panel">
    <span class="overlay-close" id="overlay-close">&times;</span>
    <div class="overlay-title" id="overlay-title"></div>
    <hr class="overlay-divider">
    <div id="overlay-body"></div>
  </div>
</div>

<script>
// =============================================
// 状態管理
// =============================================
let gatyaData = [];
let saleData  = [];
let itemData  = [];
let saleNames  = new Map(); // stageId -> 名前
let gatyaNames = new Map(); // gacha id -> 名前

// =============================================
// 定数
// =============================================
const WEEKDAY_JP = { Mon:'月', Tue:'火', Wed:'水', Thu:'木', Fri:'金', Sat:'土', Sun:'日' };
const DOW_JP     = ['日','月','火','水','木','金','土'];

// =============================================
// sale 非表示設定（常設イベントなど）
// デフォルトで非表示にしたいIDを設定する
// ranges: { from, to } の形式で範囲指定
// ids:    個別IDを指定
// =============================================
const SALE_HIDDEN_CONFIG = {
  ranges: [
    { from: 1000, to: 1999 }, // 常設イベント群
  ],
  ids: [
    // 例: 1004,
  ],
};

function isSaleHidden(id) {
  for (const r of SALE_HIDDEN_CONFIG.ranges) {
    if (id >= r.from && id <= r.to) return true;
  }
  return SALE_HIDDEN_CONFIG.ids.includes(id);
}

// =============================================
// ミッション判定
// 対象: 8000台, 9000台, 15000台, 17000台
// =============================================
function isMissionId(id) {
  return (id >= 8000  && id <= 8999)  ||
         (id >= 9000  && id <= 9999)  ||
         (id >= 15000 && id <= 15999) ||
         (id >= 17000 && id <= 17999);
}

// =============================================
// 時刻文字列パース
// "800" → "08:00", "1100" → "11:00", "0" → "00:00"
// =============================================
function parseTimeStr(t) {
  const s = String(t).padStart(4, '0');
  return `${s.slice(0,2)}:${s.slice(2,4)}`;
}

// 00:00かどうか（表示省略判定）
function isMidnight(t) {
  const s = String(t).padStart(4, '0');
  return s === '0000';
}

// =============================================
// ヘッダー日付パース → Date
// dateStr: "20260216", timeStr: "1100"
// =============================================
function parseDateTime(dateStr, timeStr) {
  const y   = parseInt(dateStr.slice(0, 4));
  const mon = parseInt(dateStr.slice(4, 6)) - 1;
  const d   = parseInt(dateStr.slice(6, 8));
  const s   = String(timeStr).padStart(4, '0');
  return new Date(y, mon, d, parseInt(s.slice(0,2)), parseInt(s.slice(2,4)));
}

// =============================================
// カード用期間文字列
// 例: "02/16〜03/03"  "02/16(11:00)〜03/03"
// 00:00は省略
// =============================================
function formatCardPeriod(dateStr, timeStr, eDateStr, eTimeStr) {
  const sm = dateStr.slice(4,6);
  const sd = dateStr.slice(6,8);
  const em = eDateStr.slice(4,6);
  const ed = eDateStr.slice(6,8);
  const st = isMidnight(timeStr)  ? '' : `(${parseTimeStr(timeStr)})`;
  const et = isMidnight(eTimeStr) ? '' : `(${parseTimeStr(eTimeStr)})`;
  return `${sm}/${sd}${st}〜${em}/${ed}${et}`;
}

// =============================================
// 詳細用日付文字列（曜日付き）
// 例: "2026/02/16(月) 11:00"
// =============================================
function formatDetailDate(dateStr, timeStr) {
  const dt  = parseDateTime(dateStr, timeStr);
  const y   = dt.getFullYear();
  const mon = String(dt.getMonth()+1).padStart(2,'0');
  const d   = String(dt.getDate()).padStart(2,'0');
  const dow = DOW_JP[dt.getDay()];
  const t   = parseTimeStr(timeStr);
  return `${y}/${mon}/${d}(${dow}) ${t}`;
}

// =============================================
// dateRanges の文字列パース
// "223 0" → 2月23日 00:00
// "1023 1100" → 10月23日 11:00
// =============================================
function parseDateRangePart(str) {
  const [datePart, timePart = '0'] = str.trim().split(' ');
  let month, day;
  if (datePart.length <= 3) {
    // 3桁: 先頭1桁=月, 残2桁=日
    month = parseInt(datePart[0]);
    day   = parseInt(datePart.slice(1));
  } else {
    // 4桁: 先頭2桁=月, 残2桁=日
    month = parseInt(datePart.slice(0,2));
    day   = parseInt(datePart.slice(2));
  }
  const timeStr = parseTimeStr(timePart);
  const midnight = isMidnight(timePart);
  return { month, day, timeStr, midnight };
}

// =============================================
// timeRanges → "08:00~10:00 & 12:00~14:00"
// =============================================
function formatTimeRanges(ranges) {
  return ranges.map(([s, e]) => `${parseTimeStr(s)}~${parseTimeStr(e)}`).join(' & ');
}

// =============================================
// 曜日配列 → "月・水・金"
// =============================================
function formatWeekdays(days) {
  return days.map(d => WEEKDAY_JP[d] || d).join('・');
}

// =============================================
// 1つの timeBlock を人間が読める形に変換
// 戻り値: 文字列（複数行の可能性あり）
// =============================================
function formatTimeBlock(block) {
  const { dateRanges, monthDays, weekdays, timeRanges } = block;
  const timeStr = formatTimeRanges(timeRanges);
  const lines   = [];

  // dateRanges: 特定期間
  if (dateRanges && dateRanges.length > 0) {
    for (const dr of dateRanges) {
      const s = parseDateRangePart(dr.start);
      const e = parseDateRangePart(dr.end);
      const sStr = `${s.month}/${String(s.day).padStart(2,'0')}${s.midnight ? '' : ' ' + s.timeStr}`;
      const eStr = `${e.month}/${String(e.day).padStart(2,'0')}${e.midnight ? '' : ' ' + e.timeStr}`;
      lines.push(`${sStr}~${eStr} ${timeStr}`);
    }
  }

  // monthDays: 毎月〇日
  if (monthDays && monthDays.length > 0) {
    lines.push(`${monthDays.join(',')}日 ${timeStr}`);
  }

  // weekdays: 曜日
  if (weekdays && weekdays.length > 0) {
    lines.push(`${formatWeekdays(weekdays)} ${timeStr}`);
  }

  return lines.join('\n');
}

// =============================================
// 全 timeBlocks → 開催期間テキスト
// =============================================
function formatTimeBlocks(blocks) {
  if (!blocks || blocks.length === 0) return '（常時開催）';
  return blocks.map(formatTimeBlock).filter(Boolean).join('\n');
}

// =============================================
// CSV パース: id,名前
// =============================================
function parseCSV(text) {
  const map = new Map();
  for (const line of text.split('\n')) {
    const idx = line.indexOf(',');
    if (idx === -1) continue;
    const id   = parseInt(line.slice(0, idx).trim());
    const name = line.slice(idx + 1).trim();
    if (!isNaN(id) && name) map.set(id, name);
  }
  return map;
}

// =============================================
// フィルタリング & ソート
// =============================================
function filterAndSort(events) {
  const now         = new Date();
  const showCurrent = document.getElementById('showCurrent').checked;
  const showPast    = document.getElementById('showPast').checked;
  const sortByDate  = document.getElementById('sortByDate').checked;

  const filtered = events.filter(e => {
    const isPast    = e.end   <= now;
    const isCurrent = e.start <= now && e.end > now;
    const isFuture  = e.start >  now;

    if (showPast)  return true;
    if (isPast)    return false;
    if (isCurrent) return showCurrent;
    if (isFuture)  return true;
    return false;
  });

  if (sortByDate) filtered.sort((a, b) => a.start - b.start);
  return filtered;
}

// =============================================
// カード HTML 生成（新レイアウト）
// クリックで openOverlay(detail) を呼ぶ
// =============================================
function makeCard(period, name, isCurrent, isPast, detail) {
  const tagClass = isPast ? 'tag-past' : isCurrent ? 'tag-current' : 'tag-future';
  const tagLabel = isPast ? '終了'     : isCurrent ? '開催中'     : '予定';
  const dataAttr = encodeURIComponent(JSON.stringify(detail));
  return `
    <div class="event-card ${isCurrent ? 'is-current' : ''}"
         onclick="openOverlay(decodeURIComponent('${dataAttr}'))">
      <span class="card-tag ${tagClass}">${tagLabel}</span>
      <div class="card-body">
        <div class="card-period">${period}</div>
        <div class="card-name">${name}</div>
      </div>
      <span class="card-arrow">›</span>
    </div>`;
}

// =============================================
// sale/mission エントリ → イベント配列に展開
// stageIds を1つずつ別オブジェクトに分割
// missionOnly: true=ミッションのみ, false=ミッション除外
// =============================================
function expandSaleEntry(entry, missionOnly) {
  const now    = new Date();
  const result = [];
  for (const id of (entry.stageIds || [])) {
    const isMission = isMissionId(id);
    if (missionOnly !== isMission) continue;

    const start   = parseDateTime(entry.header.startDate, entry.header.startTime);
    const end     = parseDateTime(entry.header.endDate,   entry.header.endTime);
    const name    = saleNames.get(id) ?? `ID:${id}`;
    const period  = formatCardPeriod(
      entry.header.startDate, entry.header.startTime,
      entry.header.endDate,   entry.header.endTime
    );
    // 詳細データ
    const detail = {
      name,
      id,
      period: `${formatDetailDate(entry.header.startDate, entry.header.startTime)} ~ ${formatDetailDate(entry.header.endDate, entry.header.endTime)}`,
      ver:    `${entry.header.minVersion}~${entry.header.maxVersion}`,
      schedule: formatTimeBlocks(entry.timeBlocks),
    };
    result.push({ start, end, name, period, detail });
  }
  return result;
}

// =============================================
// オーバーレイ 開く
// =============================================
function openOverlay(jsonStr) {
  const d  = JSON.parse(jsonStr);
  const el = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = `${d.name}　ID: ${d.id}`;

  let bodyHtml = '';

  if (d.type === 'gatya') {
    // ガチャ詳細
    const flagLine = d.flagLabel ? `<br>${d.flagLabel}` : '';
    const guarLine = d.guaranteed ? '<br>＜確定あり＞' : '';
    bodyHtml = `
      <div class="overlay-section">
        <div class="overlay-label">期間</div>
        <div class="overlay-value">${d.period}</div>
      </div>
      <div class="overlay-section">
        <div class="overlay-label">ver</div>
        <div class="overlay-value">${d.ver}</div>
      </div>
      <div class="overlay-section">
        <div class="overlay-label">詳細</div>
        <div class="overlay-value">バナー位置 ${d.gachaCount}${flagLine}${guarLine}</div>
      </div>
      <div class="overlay-section">
        <div class="overlay-label">レート</div>
        <div class="overlay-value">${d.rates || '（データなし）'}</div>
      </div>
      ${d.message ? `<hr class="overlay-divider">
      <div class="overlay-section">
        <div class="overlay-label">【タイトル】</div>
        <div class="overlay-value">${d.message}</div>
      </div>` : ''}`;
  } else {
    // sale/item/mission 詳細
    bodyHtml = `
      <div class="overlay-section">
        <div class="overlay-label">期間</div>
        <div class="overlay-value">${d.period}</div>
      </div>
      <div class="overlay-section">
        <div class="overlay-label">ver</div>
        <div class="overlay-value">${d.ver}</div>
      </div>
      <div class="overlay-section">
        <div class="overlay-label">開催期間</div>
        <div class="overlay-value">${d.schedule}</div>
      </div>`;
  }

  document.getElementById('overlay-body').innerHTML = bodyHtml;
  el.classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// =============================================
// 汎用: イベント配列からカードHTML生成
// =============================================
function buildCards(events) {
  const now = new Date();
  return events.map(e => {
    const isCurrent = e.start <= now && e.end > now;
    const isPast    = e.end   <= now;
    return makeCard(e.period, e.name, isCurrent, isPast, e.detail);
  }).join('');
}

// =============================================
// flags → ラベル変換
// =============================================
const FLAGS_LABEL = {
  4:     '【step up】',
  20600: '＋福引＆かけら',
  16384: '＋かけら',
  4216:  '＋福引',
};

// =============================================
// rates → 表示テキスト（0は非表示）
// =============================================
const RATE_LABELS = [
  ['normal',     'ノーマル'],
  ['rare',       'レア'],
  ['superRare',  '激レア'],
  ['uberRare',   '超激レア'],
  ['legendRare', '伝説レア'],
];
function formatRates(rates) {
  return RATE_LABELS
    .filter(([k]) => (rates[k] ?? 0) > 0)
    .map(([k, label]) => `${label}: ${(rates[k] / 100).toFixed(2)}%`)
    .join('\n');
}

// =============================================
// ガチャタイプ → サブタブID
// =============================================
function gachaTypeToSub(t) {
  if (t === 0) return 'normal';
  if (t === 4) return 'event';
  return 'rare'; // 1 and others
}

// =============================================
// ガチャタブ描画
// type 0: ノーマル, 1: レア, 4: イベント
// type 2, 3: 非表示
// セクションヘッダーで区切って1ページに表示
// =============================================
function renderGatya() {
  const cont = document.getElementById('gatya');

  // type 2,3 は除外して振り分け
  const buckets = { normal: [], rare: [], event: [] };

  for (const entry of gatyaData) {
    const h    = entry.header;
    const type = h.gachaType;

    // type 2,3 は非表示
    if (type === 2 || type === 3) continue;

    const sub   = gachaTypeToSub(type);
    const start = parseDateTime(h.startDate, h.startTime);
    const end   = parseDateTime(h.endDate,   h.endTime);

    for (const g of (entry.gachas || [])) {
      const csvName   = gatyaNames.get(g.id);
      const flagLabel = FLAGS_LABEL[g.flags] || '';
      const guarLabel = g.guaranteed ? '＜確定＞' : '';
      const nameParts = [csvName ?? `ID:${g.id}`, guarLabel, flagLabel].filter(Boolean);
      const period    = formatCardPeriod(h.startDate, h.startTime, h.endDate, h.endTime);
      const rateText  = formatRates(g.rates || {});
      const msgText   = (g.message && g.message !== '0') ? g.message : '';

      const detail = {
        type: 'gatya',
        name: csvName ?? `ID:${g.id}`,
        id:   g.id,
        period: `${formatDetailDate(h.startDate, h.startTime)} ~ ${formatDetailDate(h.endDate, h.endTime)}`,
        ver:    `${h.minVersion}~${h.maxVersion}`,
        gachaCount: h.gachaCount,
        rates:   rateText,
        message: msgText,
        guaranteed: g.guaranteed,
        flagLabel,
      };

      buckets[sub].push({ start, end, name: nameParts.join(' '), period, detail });
    }
  }

  // セクション定義（表示順）
  const sections = [
    { key: 'normal', label: 'ノーマル' },
    { key: 'rare',   label: 'レア' },
    { key: 'event',  label: 'イベント' },
  ];

  let html = '';
  let totalCount = 0;

  for (const { key, label } of sections) {
    const filtered = filterAndSort(buckets[key]);
    if (filtered.length === 0) continue;
    totalCount += filtered.length;
    html += `
      <div class="gatya-section">
        <div class="gatya-section-header">${label}</div>
        ${buildCards(filtered)}
      </div>`;
  }

  if (html === '') {
    cont.innerHTML = '<div class="empty">🐈 表示するガチャイベントがありません</div>';
  } else {
    cont.innerHTML = `<div class="count-label">${totalCount} 件</div>` + html;
  }
}

// =============================================
// セールタブ描画（ミッション除外）
// =============================================
function renderSale() {
  const cont   = document.getElementById('sale');
  const events = saleData.flatMap(entry => expandSaleEntry(entry, false));
  const filtered = filterAndSort(events);
  if (filtered.length === 0) {
    cont.innerHTML = '<div class="empty">🐈 表示するイベントがありません</div>'; return;
  }
  cont.innerHTML = `<div class="count-label">${filtered.length} 件</div>` + buildCards(filtered);
}

function showTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });
  document.querySelectorAll('.content').forEach(c => {

// =============================================
// データ読み込み
// =============================================
async function loadData() {
  try {
    const BASE = 'https://kbc-rakv0.vercel.app/data';
    const [gatyaRes, saleRes, itemRes, saleNameRes, gatyaNameRes] = await Promise.all([
      fetch(`${BASE}/gatya.json`),
      fetch(`${BASE}/sale.json`),
      fetch(`${BASE}/item.json`),
      fetch(`${BASE}/sale_name.csv`),
      fetch(`${BASE}/gatya_name.csv`),
    ]);

    gatyaData = await gatyaRes.json();
    saleData  = await saleRes.json();
    itemData  = await itemRes.json();

    const saleNameText  = await saleNameRes.text();
    saleNames = parseCSV(saleNameText);

    // gatya_name.csv（空でもエラーにしない）
    const gatyaNameText = await gatyaNameRes.text().catch(() => '');
    gatyaNames = parseCSV(gatyaNameText);

    renderAll();
  } catch (err) {
    console.error('データ読み込みエラー:', err);
    document.querySelectorAll('.loading').forEach(el => {
      el.textContent = 'データの読み込みに失敗しました: ' + err.message;
    });
  }
}

// =============================================
// 現在時刻表示
// =============================================
function formatDate(date) {
  const y   = date.getFullYear();
  const mon = String(date.getMonth()+1).padStart(2,'0');
  const d   = String(date.getDate()).padStart(2,'0');
  const h   = String(date.getHours()).padStart(2,'0');
  const min = String(date.getMinutes()).padStart(2,'0');
  return `${y}/${mon}/${d} ${h}:${min}`;
}
function updateNow() {
  document.getElementById('now-display').textContent = '現在: ' + formatDate(new Date());
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => showTab(tab.dataset.tab));

  document.getElementById(id).addEventListener('change', renderAll);

document.getElementById('overlay-close').addEventListener('click', closeOverlay);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});

// 初期化
updateNow();
setInterval(updateNow, 60000);
loadData();

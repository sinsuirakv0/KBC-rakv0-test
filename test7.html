<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090e;
  --surface: #0f1117;
  --surface2: #181922;
  --border: #252733;
  --border2: #333645;
  --accent: #ff6b35;
  --accent2: #00c4ff;
  --text: #e8eaf0;
  --text2: #7c8094;
  --success: #4eff9e;
  --danger: #ff4d4d;
  --player-h: 80px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: stretch;
  gap: 0;
  flex-shrink: 0;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--accent);
  display: flex;
  align-items: center;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  margin-right: 4px;
  user-select: none;
}

.tabs {
  display: flex;
}

.tab {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  padding: 0 18px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  white-space: nowrap;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.pl-badge {
  display: none;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
  line-height: 1.4;
}

.pl-badge.visible { display: inline; }

.search-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
}

.search-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 6px 12px;
  width: 210px;
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--text2); }

/* ── Content ── */
.content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

.tab-panel {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  flex-direction: column;
  gap: 3px;
}
.tab-panel.active { display: flex; }

/* ── Song row ── */
.song-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  transition: background 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.song-row:hover { background: var(--surface2); border-color: var(--border2); }
.song-row.playing { border-color: var(--accent); background: rgba(255,107,53,0.06); }
.song-row.playing .song-title { color: var(--accent); }

.song-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

.song-title {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s;
}

.song-version {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
}

.song-fmt-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  color: var(--text2);
  flex-shrink: 0;
}

.song-actions {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
.btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.btn.play-btn:hover { color: var(--accent2); border-color: var(--accent2); }
.btn.play-btn.active { color: var(--accent2); border-color: var(--accent2); background: rgba(0,196,255,0.08); }
.btn.add-btn:hover { color: var(--success); border-color: var(--success); }
.btn.add-btn.in-pl { color: var(--success); border-color: var(--success); background: rgba(78,255,158,0.08); }
.btn.dl-btn:hover { color: var(--accent); border-color: var(--accent); }
.btn.remove-btn:hover { color: var(--danger); border-color: var(--danger); }

/* ── Loading / Empty ── */
.status-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 13px;
  text-align: center;
}
.status-icon { font-size: 36px; opacity: 0.5; }
.spinner {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Playlist toolbar ── */
.pl-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 10px;
  flex-shrink: 0;
}

.action-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 6px 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.action-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.action-btn.primary { color: var(--accent); border-color: rgba(255,107,53,0.4); }
.action-btn.primary:hover { background: rgba(255,107,53,0.1); border-color: var(--accent); }

.pl-count {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text2);
}

/* ── Player ── */
.player {
  height: var(--player-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 16px;
  flex-shrink: 0;
}

.player-info {
  flex: 1.2;
  min-width: 0;
}
.player-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  margin-top: 3px;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.ctrl-btn:hover { color: var(--text); background: var(--surface2); }
.ctrl-btn.main { font-size: 20px; color: var(--text); }
.ctrl-btn.main:hover { color: var(--accent); }

.progress-area {
  flex: 2;
  display: flex;
  align-items: center;
  gap: 10px;
}

.time {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  width: 34px;
  text-align: center;
  flex-shrink: 0;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-track:hover .progress-fill { background: var(--accent2); }
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  pointer-events: none;
  width: 0%;
}

.vol-area {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 110px;
  flex-shrink: 0;
}
.vol-icon { font-size: 13px; color: var(--text2); }
.vol-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--player-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 12px;
  color: var(--text);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">BGM</div>
  <div class="tabs">
    <div class="tab active" data-tab="ogg">OGG</div>
    <div class="tab" data-tab="mp3">MP3</div>
    <div class="tab" data-tab="playlist">
      PLAYLIST
      <span class="pl-badge" id="pl-badge">0</span>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="text" id="search-input" placeholder="曲名で検索...">
  </div>
</div>

<div class="content">
  <div class="tab-panel active" id="panel-ogg">
    <div class="status-block"><div class="spinner"></div><span>読み込み中...</span></div>
  </div>
  <div class="tab-panel" id="panel-mp3">
    <div class="status-block"><div class="spinner"></div><span>読み込み中...</span></div>
  </div>
  <div class="tab-panel" id="panel-playlist">
    <div class="pl-toolbar">
      <button class="action-btn primary" id="share-btn">🔗 URLをコピー</button>
      <button class="action-btn" id="clear-btn">🗑 クリア</button>
      <span class="pl-count" id="pl-count">0曲</span>
    </div>
    <div id="playlist-songs">
      <div class="status-block">
        <div class="status-icon">🎵</div>
        <span>OGG・MP3タブから ＋ ボタンで追加してください</span>
      </div>
    </div>
  </div>
</div>

<div class="player">
  <div class="player-info">
    <div class="player-title" id="player-title">再生停止中</div>
    <div class="player-meta" id="player-meta">—</div>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" id="prev-btn" title="前の曲">⏮</button>
    <button class="ctrl-btn main" id="play-btn" title="再生/一時停止">▶</button>
    <button class="ctrl-btn" id="next-btn" title="次の曲">⏭</button>
  </div>
  <div class="progress-area">
    <span class="time" id="cur-time">0:00</span>
    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time" id="dur-time">0:00</span>
  </div>
  <div class="vol-area">
    <span class="vol-icon">🔊</span>
    <input class="vol-slider" type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──
const URLS = {
  ogg: 'https://raw.githubusercontent.com/Sugar2550/ogg-music-downloader/main/songs_ogg.json',
  mp3: 'https://raw.githubusercontent.com/Sugar2550/ogg-music-downloader/main/songs_mp3.json',
};

// ── State ──
const songs   = { ogg: [], mp3: [] };
let playlist  = [];            // [{ ...song, format }]
let current   = null;          // { song, format }
let queue     = [];            // playback queue
let queueIdx  = -1;

const audio   = new Audio();
audio.volume  = 0.8;

// ── Fetch ──
async function init() {
  try {
    const [r1, r2] = await Promise.all([fetch(URLS.ogg), fetch(URLS.mp3)]);
    songs.ogg = await r1.json();
    songs.mp3 = await r2.json();
  } catch (e) {
    ['ogg','mp3'].forEach(f => {
      document.getElementById('panel-' + f).innerHTML =
        '<div class="status-block"><div class="status-icon">⚠️</div><span>読み込み失敗: ' + e.message + '</span></div>';
    });
    return;
  }
  renderList('ogg');
  renderList('mp3');
  loadFromURL();
}

// ── Render song list ──
function renderList(fmt) {
  const panel = document.getElementById('panel-' + fmt);
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const list = songs[fmt].filter(s => !q || s.title.toLowerCase().includes(q));

  if (list.length === 0) {
    panel.innerHTML = '<div class="status-block"><div class="status-icon">🔍</div><span>曲が見つかりませんでした</span></div>';
    return;
  }

  panel.innerHTML = list.map((s, i) => {
    const isPlaying = current && current.song.id === s.id && current.format === fmt;
    const inPL = playlist.some(p => p.id === s.id && p.format === fmt);
    return `<div class="song-row${isPlaying ? ' playing' : ''}">
      <span class="song-num">${i + 1}</span>
      <span class="song-title">${esc(s.title)}</span>
      <span class="song-version">v${esc(s.version)}</span>
      <div class="song-actions">
        <button class="btn play-btn${isPlaying ? ' active' : ''}" title="再生"
          onclick="playSong('${fmt}',${s.id})">▶</button>
        <button class="btn add-btn${inPL ? ' in-pl' : ''}" title="プレイリストに追加"
          onclick="togglePlaylist('${fmt}',${s.id})">＋</button>
        <button class="btn dl-btn" title="ダウンロード"
          onclick="downloadSong(${JSON.stringify(s.file)},${JSON.stringify(s.title)})">↓</button>
      </div>
    </div>`;
  }).join('');
}

// ── Play ──
function playSong(fmt, id) {
  const song = songs[fmt].find(s => s.id === id);
  if (!song) return;

  // Toggle if same track
  if (current && current.song.id === id && current.format === fmt) {
    audio.paused ? audio.play() : audio.pause();
    return;
  }

  current = { song, format: fmt };
  audio.src = song.file;
  audio.play().catch(() => showToast('❌ 再生できませんでした (URLを確認してください)'));

  // Build queue from active context
  const activeTab = document.querySelector('.tab.active').dataset.tab;
  if (activeTab === 'playlist') {
    queue = [...playlist];
    queueIdx = queue.findIndex(p => p.id === id && p.format === fmt);
  } else {
    queue = songs[fmt].map(s => ({ ...s, format: fmt }));
    queueIdx = queue.findIndex(p => p.id === id);
  }

  updatePlayerBar();
  renderList('ogg');
  renderList('mp3');
  renderPlaylist();
}

function updatePlayerBar() {
  if (!current) return;
  document.getElementById('player-title').textContent = current.song.title;
  document.getElementById('player-meta').textContent =
    current.format.toUpperCase() + ' · v' + current.song.version;
}

function setPlayBtn(paused) {
  document.getElementById('play-btn').textContent = paused ? '▶' : '⏸';
}

// ── Audio events ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = p + '%';
  document.getElementById('cur-time').textContent = fmtTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('dur-time').textContent = fmtTime(audio.duration);
});
audio.addEventListener('ended',  () => playNext());
audio.addEventListener('play',   () => setPlayBtn(false));
audio.addEventListener('pause',  () => setPlayBtn(true));

document.getElementById('progress-track').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});
document.getElementById('play-btn').addEventListener('click', () => {
  if (!current) return;
  audio.paused ? audio.play() : audio.pause();
});
document.getElementById('prev-btn').addEventListener('click', playPrev);
document.getElementById('next-btn').addEventListener('click', playNext);
document.getElementById('vol-slider').addEventListener('input', e => {
  audio.volume = parseFloat(e.target.value);
});

function playNext() {
  if (!queue.length) return;
  queueIdx = (queueIdx + 1) % queue.length;
  const t = queue[queueIdx];
  playSong(t.format, t.id);
}
function playPrev() {
  if (!queue.length) return;
  queueIdx = (queueIdx - 1 + queue.length) % queue.length;
  const t = queue[queueIdx];
  playSong(t.format, t.id);
}

function fmtTime(s) {
  if (isNaN(s) || s === Infinity) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ── Playlist ──
function togglePlaylist(fmt, id) {
  const song = songs[fmt].find(s => s.id === id);
  if (!song) return;
  const idx = playlist.findIndex(p => p.id === id && p.format === fmt);
  if (idx >= 0) {
    playlist.splice(idx, 1);
    showToast('プレイリストから削除しました');
  } else {
    playlist.push({ ...song, format: fmt });
    showToast('プレイリストに追加しました ✓');
  }
  syncPLBadge();
  renderList('ogg');
  renderList('mp3');
  renderPlaylist();
}

function removeFromPlaylist(fmt, id) {
  playlist = playlist.filter(p => !(p.id === id && p.format === fmt));
  syncPLBadge();
  renderList('ogg');
  renderList('mp3');
  renderPlaylist();
}

function renderPlaylist() {
  const container = document.getElementById('playlist-songs');
  document.getElementById('pl-count').textContent = playlist.length + '曲';

  if (playlist.length === 0) {
    container.innerHTML = '<div class="status-block"><div class="status-icon">🎵</div><span>OGG・MP3タブから ＋ ボタンで追加してください</span></div>';
    return;
  }

  container.innerHTML = playlist.map((s, i) => {
    const isPlaying = current && current.song.id === s.id && current.format === s.format;
    return `<div class="song-row${isPlaying ? ' playing' : ''}">
      <span class="song-num">${i + 1}</span>
      <span class="song-title">${esc(s.title)}</span>
      <span class="song-fmt-badge">${s.format.toUpperCase()}</span>
      <div class="song-actions">
        <button class="btn play-btn${isPlaying ? ' active' : ''}" title="再生"
          onclick="playSong('${s.format}',${s.id})">▶</button>
        <button class="btn dl-btn" title="ダウンロード"
          onclick="downloadSong(${JSON.stringify(s.file)},${JSON.stringify(s.title)})">↓</button>
        <button class="btn remove-btn" title="削除"
          onclick="removeFromPlaylist('${s.format}',${s.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function syncPLBadge() {
  const badge = document.getElementById('pl-badge');
  if (playlist.length > 0) {
    badge.textContent = playlist.length;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

// ── Share / URL ──
// Encoding: ogg id = "1001", mp3 id = "m1001"
document.getElementById('share-btn').addEventListener('click', () => {
  if (!playlist.length) { showToast('プレイリストが空です'); return; }
  const ids = playlist.map(p => (p.format === 'mp3' ? 'm' : '') + p.id).join(',');
  const url = location.origin + location.pathname + '?sd=' + ids;
  navigator.clipboard.writeText(url)
    .then(() => showToast('URLをコピーしました 🔗'))
    .catch(() => { prompt('このURLをコピーしてください:', url); });
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!playlist.length) return;
  playlist = [];
  syncPLBadge();
  renderPlaylist();
  renderList('ogg');
  renderList('mp3');
  showToast('プレイリストをクリアしました');
});

function loadFromURL() {
  const sd = new URLSearchParams(location.search).get('sd');
  if (!sd) return;
  let added = 0;
  sd.split(',').forEach(raw => {
    const isMp3 = raw.startsWith('m');
    const id = parseInt(isMp3 ? raw.slice(1) : raw);
    const fmt = isMp3 ? 'mp3' : 'ogg';
    const song = songs[fmt].find(s => s.id === id);
    if (song && !playlist.some(p => p.id === id && p.format === fmt)) {
      playlist.push({ ...song, format: fmt });
      added++;
    }
  });
  if (added > 0) {
    syncPLBadge();
    renderPlaylist();
    showToast('プレイリストを読み込みました (' + added + '曲) 🎵');
  }
}

// ── Download ──
function downloadSong(fileUrl, title) {
  const a = document.createElement('a');
  a.href = fileUrl;
  a.download = title;
  a.target   = '_blank';
  a.rel      = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('ダウンロード開始 ↓');
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'playlist') queue = [...playlist];
  });
});

// ── Search ──
let searchTimer;
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { renderList('ogg'); renderList('mp3'); }, 180);
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ── Util ──
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Start ──
init();
</script>

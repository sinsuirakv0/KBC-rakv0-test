<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGM Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface-h:    #1c2128;
      --surface2:     #21262d;
      --accent:       #ff8400;
      --accent-dim:   rgba(255,132,0,.15);
      --accent2:      #ffc566;
      --green:        #3fb950;
      --blue:         #79c0ff;
      --red:          #f85149;
      --text:         #e6edf3;
      --text2:        #8b949e;
      --text3:        #484f58;
      --border:       #30363d;
      --border-h:     #444c56;
      --player-h:     76px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding-bottom: calc(var(--player-h) + 16px);
    }

    /* ── HEADER ─────────────────────── */
    .header {
      background: linear-gradient(180deg, #161b22 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .header-logo { font-size: 22px; }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.5px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 1px;
    }

    /* ── TABS ─────────────────────────── */
    .tabs { display: flex; gap: 2px; }

    .tab {
      padding: 8px 22px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      transition: all .15s;
      border: 1px solid transparent;
      border-bottom: none;
      position: relative;
      top: 1px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
      user-select: none;
    }

    .tab:hover { color: var(--text); background: var(--surface2); }

    .tab.active {
      color: var(--accent);
      background: var(--bg);
      border-color: var(--border);
      border-bottom-color: var(--bg);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #000;
      border-radius: 9999px;
      font-size: 10px;
      min-width: 17px;
      height: 17px;
      padding: 0 4px;
      margin-left: 5px;
      font-weight: 700;
      vertical-align: middle;
    }

    /* ── MAIN ─────────────────────────── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 16px;
    }

    /* ── SEARCH ─────────────────────── */
    .search-bar { position: relative; margin-bottom: 10px; }

    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px 8px 34px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      transition: border-color .15s;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text3); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 13px;
      pointer-events: none;
    }

    /* ── SONG LIST ─────────────────── */
    .list-meta {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 7px;
      font-family: 'JetBrains Mono', monospace;
    }

    .song-list { display: flex; flex-direction: column; gap: 2px; }

    .song-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background .1s, border-color .1s;
    }

    .song-row:hover { background: var(--surface-h); border-color: var(--border-h); }

    .song-row.playing {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .song-title {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-row.playing .song-title { color: var(--accent2); font-weight: 500; }

    .version-tag {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    /* ── ICON BUTTONS ──────────────── */
    .btn-icon {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all .15s;
      flex-shrink: 0;
    }

    .btn-icon:hover { color: var(--text); border-color: var(--border-h); }

    .btn-icon.play-btn:hover { color: var(--accent2); border-color: var(--accent2); }
    .btn-icon.play-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    .btn-icon.dl-btn:hover { color: var(--blue); border-color: var(--blue); }

    .btn-icon.add-btn:hover { color: var(--green); border-color: var(--green); }
    .btn-icon.add-btn.added {
      color: var(--green);
      border-color: var(--green);
      background: rgba(63,185,80,.1);
    }

    .btn-icon.remove-btn:hover { color: var(--red); border-color: var(--red); }

    /* ── PLAYLIST TAB ──────────────── */
    .pl-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid;
      transition: all .15s;
      font-family: 'Noto Sans JP', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

    .btn-ghost { background: transparent; color: var(--text2); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-h); }

    .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-danger:hover { background: rgba(248,81,73,.1); }

    .pl-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background .1s;
    }

    .pl-row:hover { background: var(--surface-h); }
    .pl-row.playing { border-color: var(--accent); background: var(--accent-dim); }

    .format-tag {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .fmt-ogg { background: rgba(255,132,0,.2); color: var(--accent2); }
    .fmt-mp3 { background: rgba(121,192,255,.2); color: var(--blue); }

    /* ── EMPTY / LOADING ───────────── */
    .empty {
      text-align: center;
      padding: 52px 20px;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.8;
    }

    .empty-icon { font-size: 34px; margin-bottom: 10px; }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px;
      color: var(--text2);
      font-size: 13px;
      gap: 12px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(248,81,73,.1);
      border: 1px solid var(--red);
      color: #ffa198;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
    }

    /* ── TOAST ──────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(var(--player-h) + 12px);
      right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border-h);
      color: var(--text);
      padding: 9px 15px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 300;
      transform: translateY(12px);
      opacity: 0;
      transition: all .2s;
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── PLAYER ─────────────────────── */
    .player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--player-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      z-index: 200;
    }

    .player-controls { display: flex; align-items: center; gap: 6px; }

    .p-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all .15s;
    }

    .p-btn:hover { color: var(--text); border-color: var(--border-h); }

    .p-btn.main {
      width: 40px; height: 40px;
      font-size: 15px;
      color: var(--accent);
      border-color: var(--accent);
    }

    .p-btn.main:hover { background: var(--accent-dim); }

    .player-info { flex: 1; min-width: 0; }

    .player-title {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-sub {
      font-size: 10px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .player-idle .player-title { color: var(--text3); }
    .player-idle .player-sub { color: var(--text3); }

    .player-progress {
      flex: 1;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 9999px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 9999px;
      width: 0%;
      transition: width .5s linear;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── TAB PANELS ─────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SCROLLBAR ──────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-h); }

    /* ── RESPONSIVE ─────────────────── */
    @media (max-width: 540px) {
      .player-progress { display: none; }
      .header-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────── -->
<div class="header">
  <div class="header-top">
    <div class="header-logo">🐱</div>
    <div>
      <div class="header-title">BGM Downloader</div>
      <div class="header-sub">にゃんこ大戦争 BGM</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="ogg"  onclick="switchTab('ogg')">OGG</div>
    <div class="tab"        data-tab="mp3"  onclick="switchTab('mp3')">MP3</div>
    <div class="tab"        data-tab="playlist" onclick="switchTab('playlist')">
      PLAYLIST<span class="badge" id="pl-badge">0</span>
    </div>
  </div>
</div>

<!-- ── MAIN ────────────────────────── -->
<div class="main">

  <!-- OGG -->
  <div class="tab-panel active" id="tab-ogg">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-ogg" placeholder="曲名で検索..."
             oninput="filterSongs('ogg', this.value)">
    </div>
    <div class="list-meta" id="meta-ogg"></div>
    <div class="song-list" id="list-ogg">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- MP3 -->
  <div class="tab-panel" id="tab-mp3">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-mp3" placeholder="曲名で検索..."
             oninput="filterSongs('mp3', this.value)">
    </div>
    <div class="list-meta" id="meta-mp3"></div>
    <div class="song-list" id="list-mp3">
      <div class="loading"><div class="spinner"></div>読み込み中...</div>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="tab-panel" id="tab-playlist">
    <div class="pl-toolbar">
      <button class="btn btn-primary"  onclick="sharePlaylist()">🔗 URLをコピー</button>
      <button class="btn btn-ghost"    onclick="playAll()">▶ すべて再生</button>
      <button class="btn btn-danger"   onclick="clearPlaylist()">🗑 クリア</button>
    </div>
    <div class="song-list" id="list-playlist">
      <div class="empty">
        <div class="empty-icon">🎵</div>
        プレイリストは空です<br>
        <small>OGG・MP3タブの + から追加できます</small>
      </div>
    </div>
  </div>

</div>

<!-- ── TOAST ────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── PLAYER ───────────────────────── -->
<div class="player player-idle" id="player">
  <div class="player-controls">
    <button class="p-btn" onclick="prevSong()" title="前の曲">⏮</button>
    <button class="p-btn main" id="btn-pp" onclick="togglePlayPause()">▶</button>
    <button class="p-btn" onclick="nextSong()" title="次の曲">⏭</button>
  </div>
  <div class="player-info">
    <div class="player-title" id="p-title">再生中の曲なし</div>
    <div class="player-sub"   id="p-sub">—</div>
  </div>
  <div class="player-progress">
    <div class="progress-track" id="prog-track" onclick="seekTo(event)">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="progress-times">
      <span id="t-cur">0:00</span>
      <span id="t-tot">0:00</span>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<!-- ── SCRIPT ───────────────────────── -->
<script>
const OGG_URL = 'https://raw.githubusercontent.com/Sugar2550/ogg-music-downloader/main/songs_ogg.json';
const MP3_URL = 'https://raw.githubusercontent.com/Sugar2550/ogg-music-downloader/main/songs_mp3.json';

// ── STATE ──────────────────────────
const data     = { ogg: [], mp3: [] };
let playlist   = [];                         // [{ ...song, format }]
let currentTab = 'ogg';
let current    = null;                       // { song, format }
let queue      = [];                         // [{ ...song, format }]
let queueIdx   = -1;
const search   = { ogg: '', mp3: '' };

const audio = document.getElementById('audio');

// ── INIT ───────────────────────────
async function init() {
  let errors = {};
  await Promise.all(['ogg', 'mp3'].map(async fmt => {
    const url = fmt === 'ogg' ? OGG_URL : MP3_URL;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      data[fmt] = Array.isArray(json) ? json : (json.songs || json.data || []);
    } catch (e) {
      errors[fmt] = e.message;
      data[fmt] = [];
    }
  }));

  // Restore playlist from ?sd=
  const sdParam = new URLSearchParams(location.search).get('sd');
  if (sdParam) {
    const ids = sdParam.split(',').map(Number).filter(Boolean);
    for (const id of ids) {
      const ogg = data.ogg.find(s => s.id === id);
      if (ogg) { playlist.push({ ...ogg, format: 'ogg' }); continue; }
      const mp3 = data.mp3.find(s => s.id === id);
      if (mp3) { playlist.push({ ...mp3, format: 'mp3' }); }
    }
  }

  renderList('ogg', errors.ogg);
  renderList('mp3', errors.mp3);
  renderPlaylist();
  updateBadge();
}

// ── RENDER SONG LIST ───────────────
function renderList(fmt, err) {
  const q    = search[fmt];
  const all  = data[fmt];
  const list = all.filter(s => !q || s.title.includes(q));
  const meta = document.getElementById(`meta-${fmt}`);
  const cont = document.getElementById(`list-${fmt}`);

  if (err) {
    meta.textContent = '';
    cont.innerHTML = `<div class="error-box">⚠ 読み込みエラー: ${esc(err)}</div>`;
    return;
  }

  meta.textContent = q
    ? `${list.length} / ${all.length} 曲 (「${q}」)`
    : `${all.length} 曲`;

  if (!list.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>該当曲なし</div>';
    return;
  }

  cont.innerHTML = list.map(s => {
    const playing = current?.format === fmt && current?.song.id === s.id;
    const added   = playlist.some(p => p.format === fmt && p.id === s.id);
    return `
      <div class="song-row ${playing ? 'playing' : ''}">
        <span class="song-title">${esc(s.title)}</span>
        ${s.version ? `<span class="version-tag">v${esc(s.version)}</span>` : ''}
        <button class="btn-icon play-btn ${playing ? 'active' : ''}"
                onclick="playSong(${s.id},'${fmt}')" title="再生">▶</button>
        <button class="btn-icon dl-btn"
                onclick="dlSong(${s.id},'${fmt}')" title="ダウンロード">⬇</button>
        <button class="btn-icon add-btn ${added ? 'added' : ''}"
                onclick="togglePL(${s.id},'${fmt}')"
                title="${added ? 'プレイリストから削除' : 'プレイリストに追加'}">
          ${added ? '✓' : '+'}
        </button>
      </div>`;
  }).join('');
}

function renderPlaylist() {
  const cont = document.getElementById('list-playlist');
  if (!playlist.length) {
    cont.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎵</div>
        プレイリストは空です<br>
        <small>OGG・MP3タブの + から追加できます</small>
      </div>`;
    return;
  }
  cont.innerHTML = playlist.map((s, i) => {
    const playing = current?.song.id === s.id && current?.format === s.format;
    return `
      <div class="pl-row ${playing ? 'playing' : ''}">
        <span class="format-tag fmt-${s.format}">${s.format.toUpperCase()}</span>
        <span class="song-title">${esc(s.title)}</span>
        ${s.version ? `<span class="version-tag">v${esc(s.version)}</span>` : ''}
        <button class="btn-icon play-btn" onclick="playFromPL(${i})" title="再生">▶</button>
        <button class="btn-icon dl-btn"   onclick="dlSong(${s.id},'${s.format}')" title="ダウンロード">⬇</button>
        <button class="btn-icon remove-btn" onclick="removeFromPL(${i})" title="削除">✕</button>
      </div>`;
  }).join('');
}

// ── TABS ───────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
}

// ── SEARCH ─────────────────────────
function filterSongs(fmt, q) {
  search[fmt] = q;
  renderList(fmt);
}

// ── PLAYLIST OPS ───────────────────
function togglePL(id, fmt) {
  const song = data[fmt].find(s => s.id === id);
  if (!song) return;
  const idx = playlist.findIndex(p => p.id === id && p.format === fmt);
  if (idx >= 0) {
    playlist.splice(idx, 1);
    showToast(`「${song.title}」を削除`);
  } else {
    playlist.push({ ...song, format: fmt });
    showToast(`「${song.title}」を追加`);
  }
  renderList('ogg'); renderList('mp3'); renderPlaylist(); updateBadge();
}

function removeFromPL(i) {
  const song = playlist[i];
  playlist.splice(i, 1);
  renderList('ogg'); renderList('mp3'); renderPlaylist(); updateBadge();
  showToast(`「${song.title}」を削除`);
}

function clearPlaylist() {
  if (!playlist.length) return;
  playlist = [];
  renderList('ogg'); renderList('mp3'); renderPlaylist(); updateBadge();
  showToast('プレイリストをクリアしました');
}

function updateBadge() {
  document.getElementById('pl-badge').textContent = playlist.length;
}

function sharePlaylist() {
  if (!playlist.length) { showToast('プレイリストが空です'); return; }
  const ids = playlist.map(s => s.id).join(',');
  const url = `${location.origin}${location.pathname}?sd=${ids}`;
  navigator.clipboard.writeText(url)
    .then(() => showToast('URLをクリップボードにコピーしました ✓'))
    .catch(() => prompt('このURLをコピーしてください:', url));
}

// ── PLAYBACK ───────────────────────
function getSong(id, fmt) { return data[fmt].find(s => s.id === id); }

function playSong(id, fmt) {
  const song = getSong(id, fmt);
  if (!song) return;

  if (current?.song.id === id && current?.format === fmt) {
    togglePlayPause(); return;
  }

  // Queue = filtered songs of same tab (or full list)
  const q = search[fmt] || '';
  queue    = data[fmt].filter(s => !q || s.title.includes(q)).map(s => ({ ...s, format: fmt }));
  queueIdx = queue.findIndex(s => s.id === id);

  startPlay({ ...song, format: fmt });
}

function playFromPL(i) {
  queue    = [...playlist];
  queueIdx = i;
  startPlay(playlist[i]);
}

function playAll() {
  if (!playlist.length) { showToast('プレイリストが空です'); return; }
  playFromPL(0);
}

function startPlay(item) {
  current = { song: item, format: item.format };
  audio.src = item.file;
  audio.play().catch(() => {});
  updatePlayerUI();
  renderList('ogg'); renderList('mp3'); renderPlaylist();
}

function togglePlayPause() {
  if (!current) return;
  if (audio.paused) audio.play().catch(() => {});
  else audio.pause();
}

function prevSong() {
  if (!queue.length) return;
  queueIdx = (queueIdx - 1 + queue.length) % queue.length;
  startPlay(queue[queueIdx]);
}

function nextSong() {
  if (!queue.length) return;
  queueIdx = (queueIdx + 1) % queue.length;
  startPlay(queue[queueIdx]);
}

function seekTo(e) {
  if (!audio.duration) return;
  const track = document.getElementById('prog-track');
  audio.currentTime = (e.offsetX / track.offsetWidth) * audio.duration;
}

function updatePlayerUI() {
  if (!current) return;
  const { song, format } = current;
  document.getElementById('player').classList.remove('player-idle');
  document.getElementById('p-title').textContent = song.title;
  document.getElementById('p-sub').textContent =
    format.toUpperCase() + (song.version ? ` · v${song.version}` : '');
}

function fmt(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? audio.currentTime / audio.duration * 100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('t-cur').textContent = fmt(audio.currentTime);
  document.getElementById('t-tot').textContent = fmt(audio.duration);
});

audio.addEventListener('play',  () => { document.getElementById('btn-pp').textContent = '⏸'; });
audio.addEventListener('pause', () => { document.getElementById('btn-pp').textContent = '▶'; });
audio.addEventListener('ended', nextSong);

// ── DOWNLOAD ───────────────────────
async function dlSong(id, fmt) {
  const song = getSong(id, fmt);
  if (!song) return;
  showToast(`ダウンロード準備中: ${song.title}`);
  try {
    const res = await fetch(song.file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const a    = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `${song.title}.${fmt}`
    });
    a.click();
    URL.revokeObjectURL(a.href);
  } catch {
    // CORS fallback: open in new tab
    Object.assign(document.createElement('a'), {
      href: song.file, target: '_blank'
    }).click();
    showToast('ブラウザで開きました（直接DLできない場合は手動保存してください）');
  }
}

// ── TOAST ──────────────────────────
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── UTILS ──────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

init();
</script>
